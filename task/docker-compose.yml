

services:
  postgres:
    image: postgres:16  
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 296500
    ports:             
      - "5433:5432"     
    volumes:
      - postgres_data:/var/lib/postgresql/data  

volumes:
  postgres_data:
    driver: local       